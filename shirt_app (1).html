<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--color-background-tertiary,#f5f5f3);color:var(--color-text-primary,#1a1a1a);font-size:15px;padding:12px;min-height:100vh}
h2{font-size:18px;font-weight:500;margin-bottom:16px}
h3{font-size:15px;font-weight:500;margin-bottom:10px}
.card{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15));border-radius:12px;padding:16px;margin-bottom:12px}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,0.3));background:transparent;cursor:pointer;font-size:14px;color:var(--color-text-secondary,#555)}
.tab.active{background:var(--color-text-primary,#1a1a1a);color:var(--color-background-primary,#fff);border-color:transparent}
.screen{display:none}.screen.active{display:block}
.btn{padding:8px 16px;border-radius:8px;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,0.3));background:transparent;cursor:pointer;font-size:14px;color:var(--color-text-primary,#1a1a1a)}
.btn:hover{background:var(--color-background-secondary,#f0f0ee)}
.btn.primary{background:var(--color-text-primary,#1a1a1a);color:var(--color-background-primary,#fff);border-color:transparent}
.btn.primary:hover{opacity:0.85}
.btn.danger{color:#a32d2d;border-color:#f09595}
.btn.danger:hover{background:#fcebeb}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;margin:2px}
.tag.short{background:#e1f5ee;color:#085041}
.tag.long{background:#e6f1fb;color:#0c447c}
.tag.warm{background:#faeeda;color:#633806}
.tag.fav{background:#fbeaf0;color:#72243e}
input[type=text],input[type=date],input[type=number],select{width:100%;padding:8px 10px;border-radius:8px;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,0.3));background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a1a);font-size:14px;margin-bottom:8px}
input[type=checkbox]{width:16px;height:16px;cursor:pointer}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.shirt-item,.client-item{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.1));gap:8px;flex-wrap:wrap}
.shirt-item:last-child,.client-item:last-child{border-bottom:none}
.muted{color:var(--color-text-secondary,#666);font-size:13px}
.big-list{margin-top:8px;max-height:320px;overflow-y:auto}
.check-item{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.1));cursor:pointer;border-radius:6px}
.check-item:last-child{border-bottom:none}
.check-item:hover{background:var(--color-background-secondary,#f5f5f3)}
.result-shirt{display:flex;align-items:center;justify-content:space-between;padding:12px;border-radius:8px;margin-bottom:6px;border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.15))}
.result-shirt.safe-shirt{background:#eaf3de;border-color:#c0dd97}
.result-shirt.blocked-shirt{background:#fcebeb;border-color:#f7c1c1;opacity:0.7}
.empty{color:var(--color-text-secondary,#666);font-size:14px;text-align:center;padding:20px}
label{font-size:14px;color:var(--color-text-secondary,#555);display:block;margin-bottom:4px}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.filter-btn{padding:5px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,0.3));background:transparent;cursor:pointer;font-size:13px;color:var(--color-text-secondary,#555)}
.filter-btn.active{background:var(--color-text-primary,#1a1a1a);color:var(--color-background-primary,#fff);border-color:transparent}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:right;padding:8px 6px;font-weight:500;color:var(--color-text-secondary,#666);border-bottom:1px solid var(--color-border-secondary,rgba(0,0,0,0.2))}
td{padding:8px 6px;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,0.1))}
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="showScreen('morning')">בוקר — מה ללבוש?</button>
  <button class="tab" onclick="showScreen('log')">יומן יומי</button>
  <button class="tab" onclick="showScreen('report')">דו"ח</button>
  <button class="tab" onclick="showScreen('shirts')">חולצות</button>
  <button class="tab" onclick="showScreen('clients')">לקוחות</button>
</div>

<!-- MORNING -->
<div id="screen-morning" class="screen active">
  <div class="card">
    <h2>מי הלקוחות שלך מחר?</h2>
    <div class="row" style="margin-bottom:10px;gap:8px">
      <input type="text" id="client-search" placeholder="חיפוש לקוח..." oninput="renderMorning()" style="flex:1;margin-bottom:0">
      <button class="btn" onclick="toggleNewClient()">+ לקוח חדש</button>
    </div>
    <div id="new-client-inline" style="display:none;background:var(--color-background-secondary,#f5f5f3);border-radius:8px;padding:12px;margin-bottom:10px">
      <div class="row">
        <input type="text" id="inline-client-name" placeholder="שם הלקוח" style="flex:1;margin-bottom:0">
        <select id="inline-client-days" style="width:90px;margin-bottom:0">
          <option value="90">90 יום</option>
          <option value="60">60 יום</option>
        </select>
        <button class="btn primary" onclick="addClientInline()">הוסף</button>
        <button class="btn" onclick="toggleNewClient()">ביטול</button>
      </div>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setTypeFilter('all',this)">כל הסוגים</button>
      <button class="filter-btn" onclick="setTypeFilter('short',this)">קצרות</button>
      <button class="filter-btn" onclick="setTypeFilter('long',this)">ארוכות</button>
      <button class="filter-btn" onclick="setTypeFilter('warm',this)">ארוכות וחמות</button>
    </div>
    <div id="client-checklist" class="big-list"></div>
    <div style="margin-top:14px">
      <button class="btn primary" onclick="calcRecommendations()" style="width:100%">הצג חולצות מומלצות</button>
    </div>
  </div>
  <div id="recommendations" style="display:none">
    <div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:10px">
        <h3 style="margin:0">חולצות בטוחות ✓</h3>
        <button class="btn" id="wa-btn" style="display:none;font-size:13px" onclick="shareToWhatsapp()">שלח לווטסאפ</button>
      </div>
      <div id="safe-shirts"></div>
    </div>
    <div class="card" id="blocked-card" style="display:none">
      <h3>חולצות חסומות</h3>
      <div id="blocked-shirts"></div>
    </div>
  </div>
</div>

<!-- LOG -->
<div id="screen-log" class="screen">
  <div class="card">
    <h2>תיעוד יום</h2>
    <label>תאריך</label>
    <input type="date" id="log-date">
    <label>חולצה שלבשת</label>
    <select id="log-shirt"><option value="">-- בחר חולצה --</option></select>
    <label style="margin-top:8px">לקוחות שנפגשת</label>
    <div id="log-client-checklist" class="big-list" style="max-height:200px"></div>
    <div style="margin-top:12px">
      <button class="btn primary" onclick="saveLog()" style="width:100%">שמור יום</button>
    </div>
  </div>
  <div class="card">
    <h3>היסטוריה</h3>
    <div id="history-list"></div>
  </div>
</div>

<!-- REPORT -->
<div id="screen-report" class="screen">
  <div class="card">
    <div class="row" style="justify-content:space-between;margin-bottom:16px">
      <h2 style="margin:0">דו"ח 3 חודשים אחרונים</h2>
      <button class="btn primary" onclick="downloadReport()">הורד CSV</button>
    </div>
    <div id="report-list"></div>
  </div>
</div>

<!-- SHIRTS -->
<div id="screen-shirts" class="screen">
  <div class="card">
    <h3>הוסף חולצה</h3>
    <label>שם / תיאור</label>
    <input type="text" id="shirt-name" placeholder="לבנה כפתורים">
    <label>סוג</label>
    <select id="shirt-type">
      <option value="short">קצרה</option>
      <option value="long">ארוכה</option>
      <option value="warm">ארוכה וחמה</option>
    </select>
    <div class="row" style="margin-top:4px">
      <input type="checkbox" id="shirt-fav">
      <label for="shirt-fav" style="margin:0;cursor:pointer">חולצה מועדפת</label>
    </div>
    <button class="btn primary" onclick="addShirt()" style="margin-top:12px">הוסף</button>
  </div>
  <div class="card">
    <h3>החולצות שלי</h3>
    <div id="shirts-list"></div>
  </div>
</div>

<!-- CLIENTS -->
<div id="screen-clients" class="screen">
  <div class="card">
    <h3>הוסף לקוח</h3>
    <label>שם לקוח</label>
    <input type="text" id="client-name" placeholder="ישראל ישראלי">
    <label>מרווח חסימה</label>
    <select id="client-days">
      <option value="90" selected>90 יום</option>
      <option value="60">60 יום</option>
    </select>
    <button class="btn primary" onclick="addClient()" style="margin-top:4px">הוסף</button>
  </div>
  <div class="card">
    <h3>הלקוחות שלי</h3>
    <div id="clients-list"></div>
  </div>
</div>

function matchShirtId(name) {
  var n = name.trim();
  var s = DEFAULT_SHIRTS.find(function(x){return x.name===n;});
  if(s) return s.id;
  s = DEFAULT_SHIRTS.find(function(x){return n.includes(x.name)||x.name.includes(n);});
  if(s) return s.id;
  var words = n.split(' ');
  s = DEFAULT_SHIRTS.find(function(x){return words.every(function(w){return x.name.includes(w);});});
  return s ? s.id : null;
}

function matchClientId(name, clients) {
  var n = name.trim();
  var c = clients.find(function(x){return x.name===n;});
  if(c) return c.id;
  c = clients.find(function(x){return x.name.includes(n)||n.includes(x.name);});
  return c ? c.id : null;
}

var stored = localStorage.getItem('shirtapp2');
var data;
if(stored) {
  data = JSON.parse(stored);
  if(!data.shirts||data.shirts.length===0) data.shirts = DEFAULT_SHIRTS.map(function(s){return Object.assign({},s);});
} else {
  data = {shirts: DEFAULT_SHIRTS.map(function(s){return Object.assign({},s);}), clients:[], logs:[]};
}

var existingNames = new Set(data.clients.map(function(c){return c.name;}));
DEFAULT_CLIENT_NAMES.forEach(function(name){
  if(!existingNames.has(name)){
    data.clients.push({id:'c'+Date.now()+Math.random().toString(36).slice(2),name:name,days:90});
    existingNames.add(name);
  }
});

var existingDates = new Set(data.logs.map(function(l){return l.date;}));
RAW_LOGS.forEach(function(r){
  if(existingDates.has(r.date)) return;
  var shirtId = matchShirtId(r.shirt);
  if(!shirtId) return;
  var clientIds = r.clients.map(function(n){return matchClientId(n,data.clients);}).filter(Boolean);
  if(!clientIds.length) return;
  data.logs.push({date:r.date,shirtId:shirtId,clients:clientIds});
  existingDates.add(r.date);
});

save();

function typeLabel(t){return t==='short'?'קצרה':t==='long'?'ארוכה':'ארוכה וחמה';}
function typeTag(t){return '<span class="tag '+t+'">'+typeLabel(t)+'</span>';}

function isBlocked(shirtId, clientId){
  var client = data.clients.find(function(c){return c.id===clientId;});
  if(!client) return false;
  var days = client.days||90;
  var cutoff = Date.now() - days*24*60*60*1000;
  return data.logs.some(function(l){
    return new Date(l.date).getTime()>=cutoff && l.shirtId===shirtId && l.clients.includes(clientId);
  });
}

function calcRecommendations(){
  var clients=[...selectedClients];
  var shirts=data.shirts.filter(function(s){return typeFilter==='all'||s.type===typeFilter;});
  var safe=[],blocked=[];
  shirts.forEach(function(s){
    var blockedBy=clients.filter(function(cid){return isBlocked(s.id,cid);});
    if(blockedBy.length) blocked.push({shirt:s,blockedBy:blockedBy});
    else safe.push(s);
  });
  safe.sort(function(a,b){return (b.fav?1:0)-(a.fav?1:0);});
  safeSHIRTS=safe;
  var safeEl=document.getElementById('safe-shirts');
  var blockedEl=document.getElementById('blocked-shirts');
  if(!safe.length) safeEl.innerHTML='<div class="empty">אין חולצות בטוחות בסינון הנוכחי</div>';
  else {
    safeEl.innerHTML=safe.map(function(s){
      return '<div class="result-shirt safe-shirt"><div><span style="font-weight:500">'+s.name+'</span>'+(s.fav?' <span class="tag fav">מועדפת</span>':'')+'</div>'+typeTag(s.type)+'</div>';
    }).join('');
    document.getElementById('wa-btn').style.display='block';
  }
  if(!blocked.length){document.getElementById('blocked-card').style.display='none';}
  else{
    document.getElementById('blocked-card').style.display='block';
    blockedEl.innerHTML=blocked.map(function(item){
      var names=item.blockedBy.map(function(id){var c=data.clients.find(function(x){return x.id===id;});return c?c.name:'';}).join(', ');
      return '<div class="result-shirt blocked-shirt"><div><span style="font-weight:500">'+item.shirt.name+'</span><div class="muted" style="font-size:12px;margin-top:2px">חסום: '+names+'</div></div>'+typeTag(item.shirt.type)+'</div>';
    }).join('');
  }
  document.getElementById('recommendations').style.display='block';
}

function downloadReport(){
  var logs=getReportLogs();
  var rows=[['תאריך','יום','חולצה','לקוחות']];
  logs.forEach(function(l){
    var d=new Date(l.date);
    var ds=d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();
    var shirt=data.shirts.find(function(s){return s.id===l.shirtId;});
    var clients=l.clients.map(function(id){var c=data.clients.find(function(x){return x.id===id;});return c?c.name:'';}).filter(Boolean).join(' | ');
    rows.push([ds,DAYS_HE[d.getDay()],shirt?shirt.name:'?',clients]);
  });
  var csv='\uFEFF'+rows.map(function(r){return r.map(function(v){return '"'+v+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download='דוח_חולצות_'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
}

            '<button class="btn" onclick="cancelClientEdit(\''+c.id+'\')">ביטול</button>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="row" style="flex-shrink:0">'+
        '<button class="btn" onclick="toggleDays(\''+c.id+'\')">'+(c.days===90?'60 יום':'90 יום')+'</button>'+
        '<button class="btn" onclick="startClientEdit(\''+c.id+'\')">עריכה</button>'+
        '<button class="btn danger" onclick="deleteClient(\''+c.id+'\')">מחק</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function startClientEdit(id){document.getElementById('cv-'+id).style.display='none';document.getElementById('ce-'+id).style.display='block';}
function cancelClientEdit(id){document.getElementById('cv-'+id).style.display='flex';document.getElementById('ce-'+id).style.display='none';}
function saveClientEdit(id){
  var c=data.clients.find(function(x){return x.id===id;});
  if(!c) return;
  var v=document.getElementById('ci-'+id).value.trim();
  if(v) c.name=v;
  save();renderClients();
}
function addClient(){
  var name=document.getElementById('client-name').value.trim();
  var days=parseInt(document.getElementById('client-days').value);
  if(!name) return;
  data.clients.push({id:'c'+Date.now(),name:name,days:days});
  save();
  document.getElementById('client-name').value='';
  renderClients();
}
function toggleDays(id){
  var c=data.clients.find(function(x){return x.id===id;});
  if(c){c.days=c.days===90?60:90;save();renderClients();}
}
function deleteClient(id){
  data.clients=data.clients.filter(function(c){return c.id!==id;});
  data.logs=data.logs.map(function(l){return {date:l.date,shirtId:l.shirtId,clients:l.clients.filter(function(cid){return cid!==id;})};});
  save();renderClients();
}

renderMorning();
</script>
</body>
</html>
